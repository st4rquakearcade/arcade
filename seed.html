<!DOCTYPE html>
<html lang="ko" data-root="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firebase 시드 업로드 — STARQUAKE ARCADE</title>
    <link rel="stylesheet" href="assets/css/tokens.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <style>
      .shell { max-width: 640px; }
      pre {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--r-1);
        padding: 12px;
        white-space: pre-wrap;
        min-height: 60px;
      }
    </style>
    <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script defer src="assets/js/firebase-config.js"></script>
    <script defer src="assets/js/firebase.js"></script>
    <script defer src="assets/js/fonts.js"></script>
    <script defer src="assets/js/theme.js"></script>
  </head>
  <body>
    <main class="shell">
      <h1>Firebase 시드 업로드</h1>
      <p class="muted">
        <code>/data/*.json</code> 파일을 Firebase 실시간 데이터베이스로 올립니다.
        처음 배포할 때 한 번만 누르면 됩니다.
      </p>
      <p id="status" class="muted">Firebase 연결 확인 중…</p>
      <button class="btn btn--primary" type="button" id="seed-btn">JSON → RTDB 업로드</button>
      <pre id="log"></pre>
    </main>

    <script>
      window.addEventListener("DOMContentLoaded", function () {
        if (window.SQTheme) SQTheme.init();
        var status = document.getElementById("status");
        var log = document.getElementById("log");
        // themes 는 읽기 전용 파일이라 시드하지 않습니다.
        var nodes = ["site", "boards", "posts"];

        function write(msg) {
          log.textContent += msg + "\n";
        }

        if (!window.SQDb || !SQDb.ready()) {
          status.textContent =
            "Firebase 미연결 — assets/js/firebase-config.js 의 키를 확인하세요.";
          return;
        }
        status.textContent = "연결됨 — 업로드 버튼을 누르세요.";

        document.getElementById("seed-btn").addEventListener("click", function () {
          status.textContent = "업로드 중…";
          log.textContent = "";
          Promise.all(
            nodes.map(function (node) {
              return fetch("data/" + node + ".json", { cache: "no-store" })
                .then(function (r) {
                  if (!r.ok) throw new Error(node + " JSON 로드 실패");
                  return r.json();
                })
                .then(function (data) {
                  return SQDb.push(node, data).then(function (ok) {
                    if (!ok) throw new Error(node + " 쓰기 실패");
                    write(node + ": OK");
                  });
                });
            })
          )
            .then(function () {
              status.textContent = "시드 완료 — 이제 사이트를 열어보세요.";
            })
            .catch(function (err) {
              status.textContent = "실패";
              write(String(err && err.message ? err.message : err));
            });
        });
      });
    </script>
  </body>
</html>
